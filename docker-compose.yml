version: '3.8'

services:
  mysql:
    image: mysql:8.0
    container_name: learnhub-mysql
    environment:
      MYSQL_ROOT_PASSWORD: root1234
      MYSQL_ROOT_HOST: '%'
      MYSQL_DATABASE: learnhub
    ports:
      - "3306:3306"
    volumes:
      - mysql-data:/var/lib/mysql
    command: --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci

volumes:
  mysql-data:

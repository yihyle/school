# 테스트 전용 설정 — 인메모리 H2(MySQL 호환 모드), Flyway 비활성, 스케줄러 억제
spring:
  datasource:
    url: jdbc:h2:mem:learnhub_test;MODE=MySQL;DATABASE_TO_LOWER=TRUE;DB_CLOSE_DELAY=-1
    driver-class-name: org.h2.Driver
    username: sa
    password: ""
  jpa:
    hibernate:
      ddl-auto: create-drop
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect
    show-sql: false
  flyway:
    enabled: false

jwt:
  secret: test-jwt-secret-key-must-be-at-least-256-bits-long-for-hs256-padding
  expiration: 3600000

discord:
  webhook-url: ""

payment:
  provider: MOCK

# 테스트 중 백그라운드 디스패처가 실행되지 않도록 간격을 길게 둔다
notification:
  max-retry: 3
  dispatch-interval-ms: 3600000
  inactive-days: 7

cors:
  allowed-origins: http://localhost:3000
